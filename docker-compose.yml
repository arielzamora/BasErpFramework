version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bas-erp-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperSecretPwd123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P SuperSecretPwd123! -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: bas-erp-backend
    ports:
      - "8080:8080"
    environment:
      # Inject connection string pointing to the SQL container
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=BasErpBd_Default;User Id=sa;Password=SuperSecretPwd123!;TrustServerCertificate=True;MultipleActiveResultSets=True;
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    container_name: bas-erp-frontend
    ports:
      - "4200:80"
    environment:
      # The browser will run on the host and make requests to localhost:8080 where the backend is mapped
      - BACKEND_URL=http://localhost:8080
    depends_on:
      - backend
