<form [formGroup]="form" (ngSubmit)="onSubmit()" class="modern-form">
  <div class="form-group">
    <label for="codigo" class="form-label">Código</label>
    <input id="codigo" type="text" formControlName="codigo" class="form-control"
           [class.is-invalid]="form.get('codigo')?.invalid && form.get('codigo')?.touched"
           placeholder="Ej: A001">
    <div class="invalid-feedback" *ngIf="form.get('codigo')?.invalid && form.get('codigo')?.touched">
      El código es requerido.
    </div>
  </div>
  
  <div class="form-group">
    <label for="nombre" class="form-label">Nombre</label>
    <input id="nombre" type="text" formControlName="nombre" class="form-control"
           [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
           placeholder="Ej: Monitor Samsung 24''">
    <div class="invalid-feedback" *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
      El nombre es requerido.
    </div>
  </div>
  
  <div class="form-group">
    <label for="precio" class="form-label">Precio</label>
    <input id="precio" type="number" formControlName="precio" class="form-control"
           [class.is-invalid]="form.get('precio')?.invalid && form.get('precio')?.touched">
    <div class="invalid-feedback" *ngIf="form.get('precio')?.invalid && form.get('precio')?.touched">
      El precio debe ser un número válido mayor a 0.
    </div>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-4">
    <button type="button" class="btn btn-outline" (click)="cancel.emit()">Cancelar</button>
    <button type="submit" class="btn btn-primary">{{ isEdit ? 'Actualizar' : 'Crear Producto' }}</button>
  </div>
</form>
